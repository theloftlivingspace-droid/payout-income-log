name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - '**.gs'
      - 'appsscript.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Push to Apps Script
        run: clasp push --force 2>&1 || (echo "=== clasp push failed ===" && exit 1)

      - name: Deploy new version (update existing Web App deployment)
        run: clasp deploy --deploymentId AKfycbz3r-wEAImmD3jJUhTE58Z6IOQV_R1Q0iYs5imf8l4f5EUqZEdIKjQJzF4HuENgiJ4 --description "Auto-deploy from GitHub Actions ${{ github.sha }}"
